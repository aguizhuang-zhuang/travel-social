<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThaiGo - 旅友匹配</title>
<link rel="stylesheet" href="styles.css">
<style>
.match-container { display:flex;flex-direction:column;align-items:center;padding:20px 16px; }
.match-stack { position:relative;width:100%;max-width:340px;height:420px;margin-bottom:24px; }
.match-card { position:absolute;top:0;left:0;width:100%;background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-xl);padding:24px;text-align:center;transition:all .4s cubic-bezier(.25,.8,.25,1.2); }
.match-card.swiping-left { transform:translateX(-150%) rotate(-20deg);opacity:0; }
.match-card.swiping-right { transform:translateX(150%) rotate(20deg);opacity:0; }
.match-card .avatar { margin:0 auto 16px;width:90px;height:90px;display:flex;align-items:center;justify-content:center;font-size:42px;border-radius:50%; }
.match-card .tags { display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:12px 0; }
.match-card .common { font-size:12px;color:var(--neon-cyan);margin-top:6px; }
.match-actions { display:flex;gap:20px; }
.match-actions button { width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;transition:.2s; }
.match-actions .btn-skip { background:rgba(255,255,255,.06);border:1px solid var(--border-glass);color:var(--text-muted); }
.match-actions .btn-like { background:var(--gradient-accent);color:#fff;box-shadow:0 4px 20px rgba(168,85,247,.4); }
.match-actions button:active { transform:scale(.9); }
.match-success { text-align:center;padding:20px;animation:popIn .5s ease; }
.match-success .avatars { display:flex;justify-content:center;gap:-12px;margin:16px 0; }
.match-success .avatars img { border:3px solid var(--bg-primary);border-radius:50%;width:64px;height:64px; }
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-container">
  <div class="top-nav">
    <a class="back-btn" href="profile.html">←</a>
    <span class="nav-title">旅友匹配</span>
  </div>

  <!-- Preference Tags -->
  <div class="page-content">
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">匹配偏好</div>
    <div class="pref-tags" id="prefTags">
      <span class="pref-tag selected">户外</span><span class="pref-tag selected">美食</span><span class="pref-tag">派对</span>
      <span class="pref-tag">瑜伽</span><span class="pref-tag">摄影</span><span class="pref-tag">潜水</span>
    </div>
  </div>

  <div class="match-container">
    <div class="match-stack" id="matchStack">
      <!-- Cards generated by JS -->
    </div>
    <div class="match-actions">
      <button class="btn-skip" onclick="swipe('left')">✕</button>
      <button class="btn-like" onclick="swipe('right')">❤️</button>
    </div>
    <div style="margin-top:16px;font-size:12px;color:var(--text-muted);" id="counter">剩余 5 人</div>
  </div>
</div>
<nav class="bottom-tab">
  <a class="tab-item" href="index.html"><span class="tab-icon">🧭</span><span class="tab-label">发现</span></a>
  <a class="tab-item" href="event.html"><span class="tab-icon">📅</span><span class="tab-label">活动</span></a>
  <a class="tab-item" href="venue.html"><span class="tab-icon">📍</span><span class="tab-label">场地</span></a>
  <a class="tab-item" href="messages.html"><span class="tab-icon">💬</span><span class="tab-label">消息</span></a>
  <a class="tab-item active" href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">我的</span></a>
</nav>

<!-- Match Success Modal -->
<div class="modal-overlay" id="matchModal" style="display:none;align-items:center;">
  <div class="modal-dialog" style="text-align:center;">
    <div class="match-success">
      <h3 style="font-size:20px;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">🎉 匹配成功！</h3>
      <p style="color:var(--text-secondary);margin-top:8px;">你们有 3 个共同兴趣</p>
      <div class="avatars" id="matchAvatars"></div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn btn-primary btn-sm" onclick="showToast('已发送打招呼消息！');document.getElementById('matchModal').style.display='none';" style="flex:1;">👋 打招呼</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('matchModal').style.display='none';" style="flex:1;">继续匹配</button>
      </div>
    </div>
  </div>
</div>

<script>
var users=[
  {name:'Somsak',city:'曼谷',interests:['户外','骑行','摄影'],common:3,color:'linear-gradient(135deg,#06b6d4,#3b82f6)',icon:'🚴'},
  {name:'Nong',city:'清迈',interests:['美食','烹饪','瑜伽'],common:2,color:'linear-gradient(135deg,#10b981,#06b6d4)',icon:'🍳'},
  {name:'Emma',city:'普吉',interests:['潜水','派对','旅行'],common:4,color:'linear-gradient(135deg,#ec4899,#f59e0b)',icon:'🤿'},
  {name:'Tom',city:'芭提雅',interests:['水上运动','派对','美食'],common:2,color:'linear-gradient(135deg,#f59e0b,#ef4444)',icon:'🏄'},
  {name:'Mai',city:'曼谷',interests:['瑜伽','摄影','户外'],common:5,color:'linear-gradient(135deg,#a855f7,#ec4899)',icon:'🧘'},
];
var currentIdx=0,currentUser=null;

function renderStack(){
  var stack=document.getElementById('matchStack');
  stack.innerHTML='';
  for(var i=currentIdx;i<users.length;i++){
    var u=users[i];
    var z=users.length-i;
    var card=document.createElement('div');
    card.className='match-card';
    card.style.zIndex=z;
    card.style.transform='scale('+(1-(users.length-i-1)*0.03)+') translateY('+((users.length-i-1)*6)+'px)';
    card.innerHTML='<div class="avatar" style="background:'+u.color+';">'+u.icon+'</div>'+
      '<h3 style="font-size:18px;margin-bottom:2px;">'+u.name+'</h3><div style="font-size:12px;color:var(--text-muted);">📍 '+u.city+'</div>'+
      '<div class="tags">'+u.interests.map(function(t){return '<span class="tag tag-cyan">'+t+'</span>'}).join('')+'</div>'+
      '<div class="common">🤝 '+u.common+' 个共同活动</div>';
    if(i===currentIdx) card.setAttribute('data-top','true');
    stack.appendChild(card);
  }
  currentUser=users[currentIdx];
  document.getElementById('counter').textContent='剩余 '+(users.length-currentIdx)+' 人';
}

function swipe(dir){
  if(currentIdx>=users.length)return;
  var topCard=document.querySelector('.match-card[data-top]');
  if(!topCard)return;
  topCard.classList.add(dir==='left'?'swiping-left':'swiping-right');
  setTimeout(function(){
    currentIdx++;
    if(dir==='right'&&Math.random()>.5){
      document.getElementById('matchAvatars').innerHTML='<div class="avatar avatar-lg" style="background:linear-gradient(135deg,#06b6d4,#a855f7);display:flex;align-items:center;justify-content:center;">😎</div><div class="avatar avatar-lg" style="background:'+currentUser.color+';display:flex;align-items:center;justify-content:center;">'+currentUser.icon+'</div>';
      document.getElementById('matchModal').style.display='flex';
    }
    if(currentIdx>=users.length){document.getElementById('matchStack').innerHTML='<div style="text-align:center;padding:60px 0;"><p style="font-size:48px;margin-bottom:12px;">🔄</p><p style="color:var(--text-secondary);">没有更多人了</p><p style="color:var(--text-muted);font-size:12px;">调整偏好或稍后再来</p></div>';document.getElementById('counter').textContent='已全部浏览';}
    else renderStack();
  },350);
}

renderStack();

document.querySelectorAll('.pref-tag').forEach(function(t){t.addEventListener('click',function(){this.classList.toggle('selected')})});

(function(){
var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),w,h,ps=[];
function R(){w=c.width=innerWidth;h=c.height=innerHeight;}R();addEventListener('resize',R);
for(var i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});
(function D(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(6,182,212,0.4)';ctx.fill();for(var j=i+1;j<ps.length;j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(6,182,212,'+(.15*(1-dist/100))+')';ctx.stroke();}}}requestAnimationFrame(D);})();
})();
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
</script>
</body>
</html>
