<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThaiGo - 聊天</title>
<link rel="stylesheet" href="styles.css">
<style>
.chat-container { padding:12px 16px; display:flex;flex-direction:column; }
.chat-date { text-align:center;font-size:11px;color:var(--text-muted);margin:12px 0; }
.chat-input-bar { position:sticky;bottom:0;display:flex;gap:8px;padding:10px 16px;background:rgba(10,14,23,.9);backdrop-filter:blur(20px);border-top:1px solid var(--border-glass); }
.chat-input-bar input { flex:1; }
.activity-invite-card { background:rgba(6,182,212,.08);border:1px solid var(--border-glow);border-radius:var(--radius-md);padding:10px;margin-top:6px;display:flex;align-items:center;gap:8px; }
.activity-invite-card .icon { width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px; }
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-container">
  <div class="top-nav">
    <a class="back-btn" href="messages.html">←</a>
    <span class="nav-title">曼谷骑行小队</span>
    <span style="font-size:11px;color:var(--text-muted);">8人在线</span>
  </div>

  <div class="chat-container">
    <div class="chat-date">6月9日 星期一</div>

    <div class="chat-bubble received">大家好！这周末的骑行路线我已经规划好了 🚴</div>
    <div class="chat-bubble received">从伦披尼公园出发，途经唐人街，终点是大皇宫，全程约15公里</div>
    <div class="chat-bubble sent">太棒了！几点出发？</div>
    <div class="chat-bubble received">早上7点集合，避开中午的太阳 🔥</div>
    <div class="chat-bubble sent">收到，我带上GoPro！</div>
    <div class="chat-bubble received">对了，我还发起了一个配套活动，大家看看 👇
      <div class="activity-invite-card">
        <div class="icon" style="background:linear-gradient(135deg,#06b6d4,#3b82f6);">🚴</div>
        <div style="flex:1;"><div style="font-size:12px;font-weight:600;">曼谷城市骑行探索</div><div style="font-size:10px;color:var(--text-muted);">6月12日 · 伦披尼公园 · 200฿</div></div>
        <button class="btn btn-primary btn-sm" onclick="showToast('已加入活动！')">加入</button>
      </div>
    </div>
    <div class="chat-bubble sent">已加入！等不及了</div>
    <div class="chat-bubble received">目前已有12人报名，上限20人，没报的抓紧哦</div>
    <div class="chat-bubble sent">大家记得带水，天气热</div>
    <div class="chat-bubble received">好的，我已经准备了冰水，集合点会有补给站 🙌</div>
    <div class="chat-bubble sent">👍👍👍</div>
  </div>

  <div class="chat-input-bar">
    <input class="input-glass" type="text" placeholder="输入消息..." id="chatInput" style="border-radius:var(--radius-full);">
    <button class="btn btn-primary btn-sm" style="border-radius:50%;width:40px;height:40px;padding:0;" onclick="sendMsg()">→</button>
  </div>
</div>
<nav class="bottom-tab">
  <a class="tab-item" href="index.html"><span class="tab-icon">🧭</span><span class="tab-label">发现</span></a>
  <a class="tab-item" href="event.html"><span class="tab-icon">📅</span><span class="tab-label">活动</span></a>
  <a class="tab-item" href="venue.html"><span class="tab-icon">📍</span><span class="tab-label">场地</span></a>
  <a class="tab-item active" href="messages.html"><span class="tab-icon">💬</span><span class="tab-label">消息</span></a>
  <a class="tab-item" href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">我的</span></a>
</nav>

<script>
(function(){
var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),w,h,ps=[];
function R(){w=c.width=innerWidth;h=c.height=innerHeight;}R();addEventListener('resize',R);
for(var i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});
(function D(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(6,182,212,0.4)';ctx.fill();for(var j=i+1;j<ps.length;j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(6,182,212,'+(.15*(1-dist/100))+')';ctx.stroke();}}}requestAnimationFrame(D);})();
})();

function sendMsg(){
  var inp=document.getElementById('chatInput');
  if(!inp.value.trim())return;
  var div=document.createElement('div');div.className='chat-bubble sent';div.textContent=inp.value;
  document.querySelector('.chat-container').appendChild(div);
  inp.value='';div.scrollIntoView({behavior:'smooth'});
}
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
</script>
</body>
</html>
