<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThaiGo - 房间详情</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-container">
  <div class="top-nav">
    <a class="back-btn" href="room.html">←</a>
    <span class="nav-title">房间详情</span>
    <button class="nav-action">❤️</button>
  </div>

  <div style="height:240px;background:linear-gradient(135deg,#06b6d4,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:64px;">🛏️</div>

  <div class="page-content">
    <div style="display:flex;align-items:center;gap:8px;"><h2 style="font-size:20px;">标准双人间</h2><span class="tag tag-cyan">酒店</span></div>
    <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">📍 曼谷素坤逸 Soi 11</div>
    <div style="font-size:24px;font-weight:700;color:var(--neon-green);margin-top:8px;">800 ฿ <span style="font-size:13px;color:var(--text-muted);">/ 晚</span></div>

    <div style="margin-top:16px;"><div class="section-title">设施</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span class="tag tag-purple">❄️ 空调</span><span class="tag tag-purple">📶 WiFi</span><span class="tag tag-purple">🍳 含早餐</span>
        <span class="tag tag-purple">🚿 独立卫浴</span><span class="tag tag-purple">📺 电视</span><span class="tag tag-purple">🧹 每日打扫</span>
      </div>
    </div>

    <div style="margin-top:16px;"><div class="section-title">入住日期</div>
      <div style="display:flex;gap:8px;">
        <input class="input-glass" type="date" value="2026-06-09" style="flex:1;">
        <span style="display:flex;align-items:center;color:var(--text-muted);">→</span>
        <input class="input-glass" type="date" value="2026-06-11" style="flex:1;">
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">2晚 · 可住 2 人</div>
    </div>

    <div style="margin-top:16px;display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" onclick="showToast('交换请求已发送！')" style="flex:1;">🔄 发起交换</button>
      <button class="btn btn-accent btn-sm" onclick="openPay()" style="flex:1;">💰 立即预订</button>
    </div>
  </div>
</div>
<nav class="bottom-tab">
  <a class="tab-item" href="index.html"><span class="tab-icon">🧭</span><span class="tab-label">发现</span></a>
  <a class="tab-item" href="event.html"><span class="tab-icon">📅</span><span class="tab-label">活动</span></a>
  <a class="tab-item" href="venue.html"><span class="tab-icon">📍</span><span class="tab-label">场地</span></a>
  <a class="tab-item active" href="messages.html"><span class="tab-icon">💬</span><span class="tab-label">消息</span></a>
  <a class="tab-item" href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">我的</span></a>
</nav>

<div class="modal-overlay" id="payModal" style="display:none;align-items:flex-end;">
  <div class="modal-sheet" id="paySheet"></div>
</div>

<script>
(function(){
var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),w,h,ps=[];
function R(){w=c.width=innerWidth;h=c.height=innerHeight;}R();addEventListener('resize',R);
for(var i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});
(function D(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(6,182,212,0.4)';ctx.fill();for(var j=i+1;j<ps.length;j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(6,182,212,'+(.15*(1-dist/100))+')';ctx.stroke();}}}requestAnimationFrame(D);})();
})();

var payStep=0,sel='';
function openPay(){payStep=0;sel='';document.getElementById('payModal').style.display='flex';renderPay();}
function closePay(){document.getElementById('payModal').style.display='none';}
function renderPay(){
  var s=document.getElementById('paySheet');
  if(payStep===0){
    s.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;"><h3>选择支付方式</h3><button onclick="closePay()" style="background:none;color:var(--text-muted);font-size:24px;">✕</button></div>'+
    '<div class="pay-option" onclick="selPay(this,\'promptpay\')"><div class="pay-icon" style="background:rgba(6,182,212,.15);color:var(--neon-cyan);">PP</div><div><div style="font-weight:600;">PromptPay</div></div></div>'+
    '<div class="pay-option" onclick="selPay(this,\'visa\')"><div class="pay-icon" style="background:rgba(59,130,246,.15);color:var(--neon-blue);">V</div><div><div style="font-weight:600;">Visa/Mastercard</div></div></div>'+
    '<button class="btn btn-primary btn-full" style="margin-top:12px;opacity:0.5;" id="cfm" disabled onclick="payStep=1;renderPay();">确认支付 1,600 ฿</button>';
  }else{
    s.innerHTML='<div style="text-align:center;"><div class="success-check" style="margin-bottom:16px;">✓</div><h3>预订成功！</h3><p style="color:var(--text-secondary);margin-top:8px;">1,600 ฿ 已支付</p><p style="font-size:12px;color:var(--text-muted);margin-top:4px;">6月9日 - 6月11日 · 2晚</p><button class="btn btn-primary btn-full" style="margin-top:20px;" onclick="closePay();showToast(\'预订成功！\')">完成</button></div>';
  }
}
function selPay(el,m){document.querySelectorAll('.pay-option').forEach(function(o){o.classList.remove('selected')});el.classList.add('selected');sel=m;var b=document.getElementById('cfm');b.disabled=false;b.style.opacity='1';}
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
</script>
</body>
</html>
