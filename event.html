<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThaiGo - 活动</title>
<link rel="stylesheet" href="styles.css">
<style>
.publish-modal-content { padding: 8px 0; }
.publish-modal-content label { font-size: 13px; color: var(--text-secondary); display: block; margin: 10px 0 4px; }
.publish-modal-content input, .publish-modal-content select, .publish-modal-content textarea {
  width: 100%; padding: 10px 14px; background: var(--bg-glass); border: 1px solid var(--border-glass);
  border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px;
}
.publish-modal-content textarea { height: 80px; resize: none; }
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-container">
  <div class="top-nav">
    <span class="nav-title">探索活动</span>
  </div>
  <div class="page-content">
    <div class="filter-scroll" id="filterBar">
      <button class="filter-chip active">全部</button>
      <button class="filter-chip">户外</button>
      <button class="filter-chip">派对</button>
      <button class="filter-chip">文化交流</button>
      <button class="filter-chip">美食</button>
      <button class="filter-chip">水上运动</button>
    </div>
  </div>
  <div class="page-content" id="eventList">
    <!-- Event cards will be generated by JS -->
  </div>
  <!-- FAB -->
  <button class="fab" onclick="openPublish()">+</button>
</div>
<nav class="bottom-tab">
  <a class="tab-item" href="index.html"><span class="tab-icon">🧭</span><span class="tab-label">发现</span></a>
  <a class="tab-item active" href="event.html"><span class="tab-icon">📅</span><span class="tab-label">活动</span></a>
  <a class="tab-item" href="venue.html"><span class="tab-icon">📍</span><span class="tab-label">场地</span></a>
  <a class="tab-item" href="messages.html"><span class="tab-icon">💬</span><span class="tab-label">消息</span></a>
  <a class="tab-item" href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">我的</span></a>
</nav>

<!-- Publish Modal -->
<div class="modal-overlay" id="publishModal" style="display:none;">
  <div class="modal-sheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h3 style="font-size:18px;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">发布活动</h3>
      <button onclick="closePublish()" style="background:none;color:var(--text-muted);font-size:24px;">✕</button>
    </div>
    <div class="publish-modal-content">
      <label>活动标题 *</label><input type="text" id="pubTitle" placeholder="给你的活动起个吸引人的名字">
      <label>活动类型</label><select id="pubCategory">
        <option>文化</option><option>户外</option><option>运动</option>
        <option>美食</option><option>社交</option><option>艺术</option>
        <option>学习</option><option>观光</option><option>水上运动</option>
      </select>
      <label>城市</label><select id="pubCity">
        <option>曼谷</option><option>清迈</option><option>普吉岛</option>
        <option>芭提雅</option><option>苏梅岛</option><option>大城府</option><option>其他</option>
      </select>
      <label>集合地点</label><input type="text" id="pubLocation" placeholder="具体地址或地标">
      <label>开始时间</label><input type="datetime-local" id="pubStartTime">
      <label>结束时间</label><input type="datetime-local" id="pubEndTime">
      <label>价格（泰铢）</label><input type="number" id="pubPrice" placeholder="0 表示免费" min="0" value="0">
      <label>人数上限</label><input type="number" id="pubMax" placeholder="20" min="2" max="500" value="20">
      <label>活动描述</label><textarea id="pubDesc" placeholder="描述活动内容、注意事项等"></textarea>
      <button class="btn btn-primary btn-full" style="margin-top:16px;" id="pubSubmitBtn">发布活动</button>
    </div>
  </div>
</div>

<script>
// ============ API Helpers ============
function getToken() { return localStorage.getItem('jwt_token') || ''; }
function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': 'Bearer ' + t } : {};
}
const API_BASE = 'https://travel-social-backend-production.up.railway.app';
function apiFetch(url, options) {
  options = options || {};
  options.headers = Object.assign(authHeaders(), options.headers || {});
  const fullUrl = url.startsWith('http') ? url : API_BASE + url;
  return fetch(fullUrl, options).then(function(res) {
    if (res.status === 401) {
      showToast('请先登录');
      if (typeof openLoginModal === 'function') openLoginModal();
      throw new Error('未登录');
    }
    return res.json();
  });
}

// ============ Load Events from API ============
var allEvents = [];

function loadEvents(category) {
  var url = '/api/events';
  if (category && category !== '全部') url += '?category=' + encodeURIComponent(category);
  showToast('加载活动中...');
  apiFetch(url)
    .then(function(data) {
      allEvents = data.events || data;
      renderEventsFromAPI(allEvents);
    })
    .catch(function(err) {
      console.error('加载活动失败', err);
      if (err.message !== '未登录') showToast('加载活动失败');
    });
}

function renderEventsFromAPI(events) {
  var h = '';
  (events || []).forEach(function(e) {
    var cover = e.cover || 'linear-gradient(135deg,#06b6d4,#3b82f6)';
    var icon = e.icon || '📅';
    var host = e.host_name || e.host || '未知';
    var date = e.start_time || e.date || '';
    var loc = e.location || e.loc || '';
    var price = e.fee !== undefined ? (e.fee === 0 ? '免费' : e.fee + '฿') : (e.price || '免费');
    var joined = e.joined_count || e.joined || 0;
    var max = e.max_participants || e.max || 0;
    var eid = e.id || 0;
    h += '<div class="activity-card" onclick="location.href=\'event-detail.html?id=' + eid + '\'">' +
      '<div class="activity-cover" style="background:' + cover + ';display:flex;align-items:center;justify-content:center;font-size:52px;">' + icon + '</div>' +
      '<div class="activity-info"><div style="font-size:15px;font-weight:600;">' + (e.title || '无标题') + '</div>' +
      '<div class="activity-meta"><span>👤 ' + host + '</span><span>📅 ' + date + '</span><span>📍 ' + loc + '</span><span>💰 ' + price + '</span></div></div>' +
      '<div class="activity-footer"><span style="font-size:12px;color:var(--neon-cyan);">👥 ' + joined + '/' + max + ' 人</span>' +
      '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();joinEvent(' + eid + ')">立即报名</button></div></div>';
  });
  document.getElementById('eventList').innerHTML = h || '<div style="text-align:center;padding:40px;color:var(--text-muted);">暂无活动</div>';
}

function joinEvent(eventId) {
  apiFetch('/api/events/' + eventId + '/join', { method: 'POST' })
    .then(function(data) {
      showToast('报名成功！');
      loadEvents(); // 刷新列表
    })
    .catch(function(err) {
      console.error('报名失败', err);
      if (err.message !== '未登录') showToast('报名失败');
    });
}

// ============ Filter ============
document.querySelectorAll('#filterBar .filter-chip').forEach(function(chip){
  chip.addEventListener('click',function(){
    document.querySelectorAll('#filterBar .filter-chip').forEach(function(c){c.classList.remove('active')});
    chip.classList.add('active');
    loadEvents(chip.textContent);
  });
});

// ============ Publish Event ============
function openPublish(){document.getElementById('publishModal').style.display='flex';}
function closePublish(){document.getElementById('publishModal').style.display='none';}

function submitPublish() {
  var title = document.getElementById('pubTitle').value.trim();
  var category = document.getElementById('pubCategory').value;
  var city = document.getElementById('pubCity').value;
  var location = document.getElementById('pubLocation').value.trim();
  var start_time = document.getElementById('pubStartTime').value;
  var end_time = document.getElementById('pubEndTime').value;
  var price = parseInt(document.getElementById('pubPrice').value) || 0;
  var max_participants = parseInt(document.getElementById('pubMax').value) || 20;
  var description = document.getElementById('pubDesc').value.trim();

  if (!title) { showToast('请填写活动标题'); return; }
  if (!start_time) { showToast('请选择开始时间'); return; }
  if (!end_time) { showToast('请选择结束时间'); return; }

  apiFetch('/api/events', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title: title,
      description: description || title,
      category: category,
      city: city,
      location: location,
      start_time: start_time,
      end_time: end_time,
      price: price,
      max_participants: max_participants,
      currency: 'THB'
    })
  })
  .then(function(data) {
    if (data.success) {
      showToast('活动发布成功！');
      closePublish();
      loadEvents();
    } else {
      showToast('发布失败: ' + (data.error || data.message || '未知错误'));
    }
  })
  .catch(function(err) {
    console.error('发布失败', err);
    if (err.message !== '未登录') showToast('发布失败，请检查网络或登录状态');
  });
}

// 绑定发布按钮
document.addEventListener('DOMContentLoaded', function() {
  var submitBtn = document.getElementById('pubSubmitBtn');
  if (submitBtn) submitBtn.onclick = function(e) { e.preventDefault(); submitPublish(); };

  // 如果 URL 带 ?openPublish=1，自动弹出发布表单
  if (window.location.search.indexOf('openPublish=1') !== -1) {
    openPublish();
    // 清除 URL 参数
    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, document.title, 'event.html');
    }
  }
});

// ============ Init ============
loadEvents();

(function(){
var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),w,h,ps=[];
function R(){w=c.width=innerWidth;h=c.height=innerHeight;}R();addEventListener('resize',R);
for(var i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});
(function D(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(6,182,212,0.4)';ctx.fill();for(var j=i+1;j<ps.length;j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(6,182,212,'+(.15*(1-dist/100))+')';ctx.stroke();}}}requestAnimationFrame(D);})();
})();
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
</script>
</body>
</html>
