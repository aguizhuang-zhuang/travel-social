<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThaiGo - 活动</title>
<link rel="stylesheet" href="styles.css">
<style>
.publish-modal-content { padding: 8px 0; }
.publish-modal-content label { font-size: 13px; color: var(--text-secondary); display: block; margin: 10px 0 4px; }
.publish-modal-content input, .publish-modal-content select, .publish-modal-content textarea {
  width: 100%; padding: 10px 14px; background: var(--bg-glass); border: 1px solid var(--border-glass);
  border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px;
}
.publish-modal-content textarea { height: 80px; resize: none; }
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-container">
  <div class="top-nav">
    <span class="nav-title">探索活动</span>
  </div>
  <div class="page-content">
    <div class="filter-scroll" id="filterBar">
      <button class="filter-chip active">全部</button>
      <button class="filter-chip">户外</button>
      <button class="filter-chip">派对</button>
      <button class="filter-chip">文化交流</button>
      <button class="filter-chip">美食</button>
      <button class="filter-chip">水上运动</button>
    </div>
  </div>
  <div class="page-content" id="eventList">
    <!-- Event cards will be generated by JS -->
  </div>
  <!-- FAB -->
  <button class="fab" onclick="openPublish()">+</button>
</div>
<nav class="bottom-tab">
  <a class="tab-item" href="index.html"><span class="tab-icon">🧭</span><span class="tab-label">发现</span></a>
  <a class="tab-item active" href="event.html"><span class="tab-icon">📅</span><span class="tab-label">活动</span></a>
  <a class="tab-item" href="venue.html"><span class="tab-icon">📍</span><span class="tab-label">场地</span></a>
  <a class="tab-item" href="messages.html"><span class="tab-icon">💬</span><span class="tab-label">消息</span></a>
  <a class="tab-item" href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">我的</span></a>
</nav>

<!-- Publish Modal -->
<div class="modal-overlay" id="publishModal" style="display:none;">
  <div class="modal-sheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h3 style="font-size:18px;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">发布活动</h3>
      <button onclick="closePublish()" style="background:none;color:var(--text-muted);font-size:24px;">✕</button>
    </div>
    <div class="publish-modal-content">
      <label>活动标题</label><input type="text" placeholder="给你的活动起个吸引人的名字">
      <label>活动类型</label><select><option>户外</option><option>派对</option><option>文化交流</option><option>美食</option><option>水上运动</option></select>
      <label>日期时间</label><input type="datetime-local">
      <label>地点</label><input type="text" placeholder="集合地点">
      <label>费用</label><select><option>免费</option><option>AA制</option><option>固定价格</option></select>
      <label>人数上限</label><input type="number" placeholder="20" min="2" max="500">
      <label>活动描述</label><textarea placeholder="描述活动内容、注意事项等"></textarea>
      <button class="btn btn-primary btn-full" style="margin-top:16px;" onclick="closePublish();showToast('活动发布成功！')">发布活动</button>
    </div>
  </div>
</div>

<script>
var events = [
  {id:1,title:'曼谷城市骑行探索',type:'户外',cover:'linear-gradient(135deg,#06b6d4,#3b82f6)',icon:'🚴',host:'Liam',date:'6月12日 09:00',loc:'伦披尼公园',price:'200฿',joined:12,max:20,city:'曼谷'},
  {id:2,title:'清迈素贴山日出瑜伽',type:'户外',cover:'linear-gradient(135deg,#10b981,#06b6d4)',icon:'🧘',host:'Sophia',date:'6月15日 06:00',loc:'素贴山脚',price:'300฿',joined:8,max:20,city:'清迈'},
  {id:3,title:'普吉岛满月沙滩派对',type:'派对',cover:'linear-gradient(135deg,#ec4899,#f59e0b)',icon:'🌕',host:'Akira',date:'6月18日 20:00',loc:'芭东海滩',price:'500฿',joined:45,max:100,city:'普吉'},
  {id:4,title:'泰式料理烹饪课堂',type:'美食',cover:'linear-gradient(135deg,#f59e0b,#ef4444)',icon:'🍳',host:'มานะ',date:'6月14日 10:00',loc:'唐人街烹饪学校',price:'800฿',joined:6,max:15,city:'曼谷'},
  {id:5,title:'芭提雅珊瑚岛浮潜',type:'水上运动',cover:'linear-gradient(135deg,#3b82f6,#06b6d4)',icon:'🤿',host:'David',date:'6月20日 08:00',loc:'芭提雅码头',price:'1500฿',joined:5,max:12,city:'芭提雅'},
  {id:6,title:'曼谷艺术文化交流夜',type:'文化交流',cover:'linear-gradient(135deg,#a855f7,#ec4899)',icon:'🎨',host:'Somsak',date:'6月16日 19:00',loc:'曼谷艺术中心',price:'免费',joined:23,max:50,city:'曼谷'},
  {id:7,title:'清迈夜市美食之旅',type:'美食',cover:'linear-gradient(135deg,#ef4444,#f59e0b)',icon:'🍜',host:'Nong',date:'6月13日 18:00',loc:'清迈夜市',price:'AA制',joined:15,max:30,city:'清迈'},
  {id:8,title:'普吉岛丛林飞跃',type:'户外',cover:'linear-gradient(135deg,#10b981,#3b82f6)',icon:'🌴',host:'Tom',date:'6月19日 09:00',loc:'卡图区',price:'1800฿',joined:4,max:10,city:'普吉'},
];

function renderEvents(filter){
  var h='';
  events.forEach(function(e){
    if(filter&&filter!=='全部'&&e.type!==filter)return;
    h+='<div class="activity-card" onclick="location.href=\'event-detail.html\'">'+
      '<div class="activity-cover" style="background:'+e.cover+';display:flex;align-items:center;justify-content:center;font-size:52px;">'+e.icon+'</div>'+
      '<div class="activity-info"><div style="font-size:15px;font-weight:600;">'+e.title+'</div>'+
      '<div class="activity-meta"><span>👤 '+e.host+'</span><span>📅 '+e.date+'</span><span>📍 '+e.loc+'</span><span>💰 '+e.price+'</span></div></div>'+
      '<div class="activity-footer"><span style="font-size:12px;color:var(--neon-cyan);">👥 '+e.joined+'/'+e.max+' 人</span>'+
      '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();showToast(\'已报名！\')">立即报名</button></div></div>';
  });
  document.getElementById('eventList').innerHTML=h;
}
renderEvents();
document.querySelectorAll('#filterBar .filter-chip').forEach(function(chip){
  chip.addEventListener('click',function(){
    document.querySelectorAll('#filterBar .filter-chip').forEach(function(c){c.classList.remove('active')});
    chip.classList.add('active');
    renderEvents(chip.textContent);
  });
});

(function(){
var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),w,h,ps=[];
function R(){w=c.width=innerWidth;h=c.height=innerHeight;}R();addEventListener('resize',R);
for(var i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});
(function D(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(6,182,212,0.4)';ctx.fill();for(var j=i+1;j<ps.length;j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(6,182,212,'+(.15*(1-dist/100))+')';ctx.stroke();}}}requestAnimationFrame(D);})();
})();
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
function openPublish(){document.getElementById('publishModal').style.display='flex';}
function closePublish(){document.getElementById('publishModal').style.display='none';}
</script>
</body>
</html>
