<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThaiGo - 场地</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-container">
  <div class="top-nav"><span class="nav-title">场地租赁</span></div>
  <div class="page-content">
    <input class="input-glass" type="text" placeholder="🔍 搜索场地名称或类型..." style="margin-bottom:12px;">
  </div>
  <div class="page-content" id="venueList"></div>
</div>
<nav class="bottom-tab">
  <a class="tab-item" href="index.html"><span class="tab-icon">🧭</span><span class="tab-label">发现</span></a>
  <a class="tab-item" href="event.html"><span class="tab-icon">📅</span><span class="tab-label">活动</span></a>
  <a class="tab-item active" href="venue.html"><span class="tab-icon">📍</span><span class="tab-label">场地</span></a>
  <a class="tab-item" href="messages.html"><span class="tab-icon">💬</span><span class="tab-label">消息</span></a>
  <a class="tab-item" href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">我的</span></a>
</nav>

<script>
// ============ API Helpers ============
function getToken() { return localStorage.getItem('jwt_token') || ''; }
function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': 'Bearer ' + t } : {};
}
const API_BASE = 'https://travel-social-backend-production.up.railway.app';
function apiFetch(url, options) {
  options = options || {};
  options.headers = options.headers || {};
  var method = (options.method || 'GET').toUpperCase();
  if (method === 'POST' || method === 'PUT' || method === 'DELETE') {
    Object.assign(options.headers, authHeaders());
  }
  const fullUrl = url.startsWith('http') ? url : API_BASE + url;
  return fetch(fullUrl, options).then(function(res) {
    if (res.status === 401) {
      showToast('请先登录');
      if (typeof openLoginModal === 'function') openLoginModal();
      throw new Error('未登录');
    }
    return res.json();
  });
}

// ============ Load Venues from API ============
function loadVenues(search) {
  var url = '/api/venues';
  if (search) url += '?search=' + encodeURIComponent(search);
  showToast('加载场地中...');
  apiFetch(url)
    .then(function(data) {
      renderVenues(data.venues || data);
    })
    .catch(function(err) {
      console.error('加载场地失败', err);
      if (err.message !== '未登录') showToast('加载场地失败');
    });
}

function renderVenues(venues) {
  var h = '';
  (venues || []).forEach(function(v) {
    var cover = v.cover || 'linear-gradient(135deg,#06b6d4,#3b82f6)';
    var icon = v.icon || '📍';
    var name = v.name || '未命名场地';
    var type = v.type || v.venue_type || '场地';
    var capacity = v.capacity || v.capacity_max || 0;
    var price = v.price_per_hour !== undefined ? v.price_per_hour + '฿' : (v.price || '0฿');
    var loc = v.location || v.address || '';
    var tags = v.tags || [];
    var vid = v.id || 0;
    h += '<div class="venue-card" onclick="location.href=\'venue-detail.html?id=' + vid + '\'">' +
      '<div class="venue-image" style="background:' + cover + ';display:flex;align-items:center;justify-content:center;font-size:56px;">' + icon + '</div>' +
      '<div class="venue-info"><div style="display:flex;align-items:center;gap:8px;"><span style="font-weight:600;font-size:15px;">' + name + '</span><span class="tag tag-cyan">' + type + '</span></div>' +
      '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">📍 ' + loc + ' · 👥 容纳 ' + capacity + ' 人 · 💰 ' + price + '/小时</div>' +
      '<div style="display:flex;gap:4px;margin-top:6px;">' + tags.slice(0, 4).map(function(t){ return '<span class="tag tag-purple">' + t + '</span>'; }).join('') + '</div></div>' +
      '<div class="venue-actions"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();showToast(\'将跳转 Google Maps 导航\')">🧭 导航</button>' +
      '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();location.href=\'venue-detail.html?id=' + vid + '\'">📋 预约</button></div></div>';
  });
  document.getElementById('venueList').innerHTML = h || '<div style="text-align:center;padding:40px;color:var(--text-muted);">暂无场地</div>';
}

// ============ Search ============
document.addEventListener('DOMContentLoaded', function() {
  var searchInput = document.querySelector('.page-content input[type="text"]');
  if (searchInput) {
    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var q = this.value.trim();
        if (q) loadVenues(q);
        else loadVenues();
      }
    });
  }
});

// ============ Init ============
loadVenues();

(function(){
  var h='';
  venues.forEach(function(v){
    h+='<div class="venue-card" onclick="location.href=\'venue-detail.html\'"><div class="venue-image" style="background:'+v.cover+';display:flex;align-items:center;justify-content:center;font-size:56px;">'+v.icon+'</div>'+
    '<div class="venue-info"><div style="display:flex;align-items:center;gap:8px;"><span style="font-weight:600;font-size:15px;">'+v.name+'</span><span class="tag tag-cyan">'+v.type+'</span></div>'+
    '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">📍 '+v.loc+' · 👥 容纳 '+v.capacity+' 人 · 💰 '+v.price+'/小时</div>'+
    '<div style="display:flex;gap:4px;margin-top:6px;">'+v.tags.map(function(t){return '<span class="tag tag-purple">'+t+'</span>'}).join('')+'</div></div>'+
    '<div class="venue-actions"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();showToast(\'将跳转 Google Maps 导航\')">🧭 导航</button>'+
    '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();location.href=\'venue-detail.html\'">📋 预约</button></div></div>';
  });
  document.getElementById('venueList').innerHTML=h;
})();

(function(){
var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),w,h,ps=[];
function R(){w=c.width=innerWidth;h=c.height=innerHeight;}R();addEventListener('resize',R);
for(var i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});
(function D(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(6,182,212,0.4)';ctx.fill();for(var j=i+1;j<ps.length;j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(6,182,212,'+(.15*(1-dist/100))+')';ctx.stroke();}}}requestAnimationFrame(D);})();
})();
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}

// ============ Auth Modal ============
var authMode = 'login';
function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
function toggleAuthForm() {
  if (authMode === 'login') {
    authMode = 'register';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('loginModalTitle').textContent = '注册';
    document.getElementById('toggleText').textContent = '已有账号？';
    document.getElementById('toggleLink').textContent = '登录';
  } else {
    authMode = 'login';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginModalTitle').textContent = '登录';
    document.getElementById('toggleText').textContent = '还没有账号？';
    document.getElementById('toggleLink').textContent = '注册';
  }
}
function handleLogin(e) {
  e.preventDefault();
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var btn = document.getElementById('loginSubmitBtn');
  btn.textContent = '登录中...'; btn.disabled = true;
  fetch(API_BASE + '/api/auth/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: password })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.token) {
      localStorage.setItem('jwt_token', data.token);
      showToast('登录成功'); closeLoginModal(); location.reload();
    } else {
      document.getElementById('loginError').textContent = data.error || data.message || '登录失败';
      document.getElementById('loginError').style.display = 'block';
    }
    btn.textContent = '登录'; btn.disabled = false;
  })
  .catch(function(err) {
    document.getElementById('loginError').textContent = '网络错误';
    document.getElementById('loginError').style.display = 'block';
    btn.textContent = '登录'; btn.disabled = false;
  });
}
function handleRegister(e) {
  e.preventDefault();
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var password = document.getElementById('regPassword').value;
  var confirm = document.getElementById('regConfirm').value;
  if (password !== confirm) {
    document.getElementById('registerError').textContent = '两次密码不一致';
    document.getElementById('registerError').style.display = 'block'; return;
  }
  var btn = document.getElementById('registerSubmitBtn');
  btn.textContent = '注册中...'; btn.disabled = true;
  fetch(API_BASE + '/api/auth/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, email: email, password: password, confirmPassword: confirm })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.token) {
      localStorage.setItem('jwt_token', data.token);
      showToast('注册成功'); closeLoginModal(); location.reload();
    } else {
      document.getElementById('registerError').textContent = data.error || data.message || '注册失败';
      document.getElementById('registerError').style.display = 'block';
    }
    btn.textContent = '注册'; btn.disabled = false;
  })
  .catch(function(err) {
    document.getElementById('registerError').textContent = '网络错误';
    document.getElementById('registerError').style.display = 'block';
    btn.textContent = '注册'; btn.disabled = false;
  });
}
</script>

<!-- Login/Register Modal -->
<div class="modal-overlay" id="loginModal" style="display:none;">
  <div class="modal-sheet" style="max-width:400px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 id="loginModalTitle" style="font-size:18px;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">登录</h3>
      <button onclick="closeLoginModal()" style="background:none;color:var(--text-muted);font-size:24px;border:none;cursor:pointer;">✕</button>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <input type="email" id="loginEmail" placeholder="邮箱地址" required style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;margin-bottom:10px;box-sizing:border-box;">
      <input type="password" id="loginPassword" placeholder="密码" required style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;margin-bottom:6px;box-sizing:border-box;">
      <div id="loginError" style="color:#ef4444;font-size:12px;margin-bottom:8px;display:none;"></div>
      <button type="submit" class="btn btn-primary btn-full" id="loginSubmitBtn">登录</button>
    </form>
    <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
      <input type="text" id="regName" placeholder="用户名" required style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;margin-bottom:10px;box-sizing:border-box;">
      <input type="email" id="regEmail" placeholder="邮箱地址" required style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;margin-bottom:10px;box-sizing:border-box;">
      <input type="password" id="regPassword" placeholder="密码" required style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;margin-bottom:10px;box-sizing:border-box;">
      <input type="password" id="regConfirm" placeholder="确认密码" required style="width:100%;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;margin-bottom:6px;box-sizing:border-box;">
      <div id="registerError" style="color:#ef4444;font-size:12px;margin-bottom:8px;display:none;"></div>
      <button type="submit" class="btn btn-primary btn-full" id="registerSubmitBtn">注册</button>
    </form>
    <div style="text-align:center;margin-top:12px;">
      <span id="toggleText" style="font-size:13px;color:var(--text-muted);">还没有账号？</span>
      <a href="javascript:void(0)" onclick="toggleAuthForm()" id="toggleLink" style="font-size:13px;color:var(--neon-cyan);margin-left:4px;">注册</a>
    </div>
  </div>
</div>
</body>
</html>
