<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ThaiGo - 我的</title>
<link rel="stylesheet" href="styles.css">
<style>
.profile-header { text-align:center;padding:24px 16px 16px;background:linear-gradient(180deg,rgba(6,182,212,.1),transparent); }
.profile-header .avatar { margin:0 auto 10px; }
.profile-header .name { font-size:20px;font-weight:700; }
.profile-header .credit { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--radius-full);background:rgba(16,185,129,.1);color:var(--neon-green);font-size:12px;margin-top:4px; }
.stat-row { display:flex;justify-content:space-around;padding:12px 0;margin:0 16px;border-radius:var(--radius-lg);background:var(--bg-card);border:1px solid var(--border-glass); }
.stat-item { text-align:center; }
.stat-item .num { font-size:20px;font-weight:700;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
.stat-item .lbl { font-size:11px;color:var(--text-muted); }
.menu-item { display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border-glass);cursor:pointer;transition:background .2s; }
.menu-item:active { background:rgba(255,255,255,.03); }
.menu-item .icon { width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:18px; }
.menu-item .arrow { margin-left:auto;color:var(--text-muted); }
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="app-container">
  <div class="top-nav"><span class="nav-title">我的</span><button class="nav-action">⚙️</button></div>

  <div class="profile-header">
    <div class="avatar avatar-xl" style="background:linear-gradient(135deg,#06b6d4,#a855f7);display:flex;align-items:center;justify-content:center;font-size:36px;">😎</div>
    <div class="name">Alex Walker</div>
    <div style="font-size:12px;color:var(--text-secondary);">@alex_wanderer · 曼谷</div>
    <div class="credit">⭐ 信用分 88</div>
    <span class="tag tag-green">已实名认证</span>
  </div>

  <div class="stat-row">
    <div class="stat-item"><div class="num">12</div><div class="lbl">参与活动</div></div>
    <div class="stat-item"><div class="num">38</div><div class="lbl">好友</div></div>
    <div class="stat-item"><div class="num">96%</div><div class="lbl">好评率</div></div>
  </div>

  <div class="page-content">
    <div class="menu-item" onclick="showToast('我的活动')">
      <div class="icon" style="background:rgba(6,182,212,.1);">📅</div><span>我的活动</span><span class="arrow">›</span>
    </div>
    <div class="menu-item" onclick="showToast('我的订单')">
      <div class="icon" style="background:rgba(168,85,247,.1);">📋</div><span>我的订单</span><span class="arrow">›</span>
    </div>
    <div class="menu-item" onclick="showToast('房间交换记录')">
      <div class="icon" style="background:rgba(236,72,153,.1);">🔄</div><span>房间交换记录</span><span class="arrow">›</span>
    </div>
    <div class="menu-item" onclick="showToast('场地预订')">
      <div class="icon" style="background:rgba(16,185,129,.1);">📍</div><span>场地预订</span><span class="arrow">›</span>
    </div>
    <div class="menu-item" onclick="location.href='matching.html'">
      <div class="icon" style="background:rgba(245,158,11,.1);">🤝</div><span>旅友匹配</span><span class="arrow">›</span>
    </div>
    <div class="menu-item" onclick="showToast('实名认证')">
      <div class="icon" style="background:rgba(99,102,241,.1);">✅</div><span>实名认证</span><span class="tag tag-green" style="margin-left:auto;">已完成</span>
    </div>
    <div class="menu-item" onclick="showToast('设置')">
      <div class="icon" style="background:rgba(100,116,139,.1);">⚙️</div><span>设置</span><span class="arrow">›</span>
    </div>
  </div>
</div>
<nav class="bottom-tab">
  <a class="tab-item" href="index.html"><span class="tab-icon">🧭</span><span class="tab-label">发现</span></a>
  <a class="tab-item" href="event.html"><span class="tab-icon">📅</span><span class="tab-label">活动</span></a>
  <a class="tab-item" href="venue.html"><span class="tab-icon">📍</span><span class="tab-label">场地</span></a>
  <a class="tab-item" href="messages.html"><span class="tab-icon">💬</span><span class="tab-label">消息</span></a>
  <a class="tab-item active" href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">我的</span></a>
</nav>

<script>
(function(){
var c=document.getElementById('particles-canvas'),ctx=c.getContext('2d'),w,h,ps=[];
function R(){w=c.width=innerWidth;h=c.height=innerHeight;}R();addEventListener('resize',R);
for(var i=0;i<60;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});
(function D(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(6,182,212,0.4)';ctx.fill();for(var j=i+1;j<ps.length;j++){var q=ps[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(6,182,212,'+(.15*(1-dist/100))+')';ctx.stroke();}}}requestAnimationFrame(D);})();
})();
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
</script>
</body>
</html>
